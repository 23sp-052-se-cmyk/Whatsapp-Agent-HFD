events {
  worker_connections 1024;
}

http {
  upstream api {
    server api:5000;
  }

  upstream web {
    server web:3000;
  }

  # Redirect HTTP to HTTPS
  server {
    listen 80;
    server_name rabta.software;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name rabta.software;

    ssl_certificate /etc/letsencrypt/live/rabta.software/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rabta.software/privkey.pem;

    # API routes
    location /api/ {
      proxy_pass http://api/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Stripe webhook
    location /stripe/ {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend
    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
